---
layout: default
---

<section class="background-color-grey">
  <div class="inner-content-top-out-bottom-out">
    <div class="container">
      <div class="row">
        <div class="col-md-12">
          <div class="panel panel-default">
            <div class="panel-heading"><h4>{{page.name}}</h4></div>
            <div class="panel-body">
              <div class="list-group">
                {% for image in page.images %}
                <div class="col-6 image-gallery">
                  <a
                    href="{{ image }}"
                    title="{{ image.name }}"
                    class="d-block mb-4 h-100"
                  >
                    <img
                      class="img-fluid img-thumbnail img-responsive"
                      src="{{ image }}"
                      alt="{{ image }}"
                      title="{{ image }}"
                    />
                  </a>
                </div>
                {% endfor %}
              </div>
              <hr />

              <div class="content">
                <div class="row">
                  <div class="col-lg-8 col-md-8 col-sm-8 col-xs-12">
                    <div class="features-sb-container">
                      <img
                        style="width:50px;height:50px"
                        src="{{ site.baseurl }}/photos/bed.svg"
                        alt="{{ site.title }}"
                      />
                      <img
                        style="width:50px;height:50px"
                        src="{{ site.baseurl }}/photos/single-bed.svg"
                        alt="{{ site.title }}"
                      />
                      <img
                        style="width:50px;height:50px"
                        src="{{ site.baseurl }}/photos/television.svg"
                        alt="{{ site.title }}"
                      />
                      <img
                        style="width:50px;height:50px"
                        src="{{ site.baseurl }}/photos/air-conditioner.svg"
                        alt="{{ site.title }}"
                      />
                      <p>
                        {{ page.body }}
                      </p>
                    </div>
                  </div>
                  <div class="col-lg-4 col-md-4 col-sm-4 col-xs-12">
                    <div class="features-sb-container"></div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
