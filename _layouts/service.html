    <div class="container">
      <div class="row">
        <div class="col-lg-6 col-md-7 col-sm-12 col-xs-12">
          <div>
            <img src="{{page.img}}" class="img-responsive" />

        </div>

          <div class=" location-map-container ">

        </div>
      </div>
    </div>
  </div>
</section>
